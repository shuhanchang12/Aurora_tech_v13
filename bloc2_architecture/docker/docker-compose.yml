version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: auroratech-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: auroratech_dwh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - data-bridge

  pgadmin:
    image: dpage/pgadmin4
    container_name: auroratech-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@auroratech.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - data-bridge

  grafana:
    image: grafana/grafana:9.5.2
    container_name: auroratech-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    networks:
      - data-bridge

networks:
  data-bridge:
    driver: bridge

volumes:
  pgdata:
