name: Bloc 4 CI

on:
  push:
    paths:
      - 'bloc4_ai_solutions/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'bloc4_ai_solutions/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bloc4_ai_solutions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
